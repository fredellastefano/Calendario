<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Interattivo con Note</title>
    <link rel="icon" type="image/png" href="MaxAndStar.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* === SOLO LE PARTI MODIFICATE === */

        .calendar-grid {
            display: grid;
            grid-template-columns: 70px repeat(7, 1fr);
            gap: 6px;
        }

        .week-num-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: clamp(12px, 2vw, 18px);
            font-weight: 700;
            color: var(--week-c);
            background: var(--week-bg);
            border: 1px solid var(--week-border);
            border-radius: 8px;
            letter-spacing: 0.04em;
            padding: 6px;
            user-select: none;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
            align-self: stretch;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: 55px repeat(7, 1fr);
                gap: 4px;
            }

            .week-num-cell {
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .calendar-grid {
                grid-template-columns: 45px repeat(7, 1fr);
                gap: 3px;
            }

            .week-num-cell {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>

<script>
    /* === SOLO LA RIGA JS MODIFICATA === */

    // PRIMA:
    // wCell.textContent = `W${week.num}`;

    // DOPO:
    wCell.textContent = `SETT. ${week.num}`;
</script>

</body>
</html>
